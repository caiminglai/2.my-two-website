server {
    listen 80;
    server_name your_domain.com www.your_domain.com;
    
    # 强制 HTTPS 重定向
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your_domain.com www.your_domain.com;

    # SSL 证书配置
    ssl_certificate /etc/letsencrypt/live/your_domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your_domain.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS 配置
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Frame-Options DENY;

    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/xml application/xml application/atom+xml application/rss+xml application/xhtml+xml image/svg+xml
        text/javascript application/javascript application/x-javascript
        text/x-json application/json application/x-web-app-manifest+json
        text/css text/plain text/x-component
        font/opentype application/x-font-ttf application/vnd.ms-fontobject
        image/x-icon;

    # Brotli 压缩配置（需要先安装 nginx-brotli 模块）
    # brotli on;
    # brotli_vary on;
    # brotli_min_length 256;
    # brotli_types
    #     text/xml application/xml application/atom+xml application/rss+xml application/xhtml+xml image/svg+xml
    #     text/javascript application/javascript application/x-javascript
    #     text/x-json application/json application/x-web-app-manifest+json
    #     text/css text/plain text/x-component
    #     font/opentype application/x-font-ttf application/vnd.ms-fontobject
    #     image/x-icon;

    # 补斜杠（重要！访问 /jzxr 自动跳转 /jzxr/）
    location = /jzxr { return 301 /jzxr/; }

    # 前端 SPA
    location /jzxr/ {
        alias /var/www/my-two-website/dist/;
        index index.html;
        try_files $uri $uri/ @jzxr_fallback;
        
        # 缓存配置
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location @jzxr_fallback {
        root /var/www/my-two-website/dist;
        try_files /index.html =404;
    }

    # API 代理（带子路径 rewrite）
    location /jzxr/api/ {
        rewrite ^/jzxr/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8080;
        
        # 代理配置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 管理后台（HTML 页面）
    location /jzxr/admin {
        rewrite ^/jzxr/admin(.*)$ /admin$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /jzxr/admin/ {
        rewrite ^/jzxr/admin/(.*)$ /admin/$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 隐藏配置：以下路径直接代理到 jzxr 后端
    location /api/admin/  { 
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/auth/   { 
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/users   { 
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /admin/main  { 
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 收款码图片（直接通过根路径访问）
    location /wechat-qr.png { 
        alias /var/www/my-two-website/dist/wechat-qr.png;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /alipay-qr.png { 
        alias /var/www/my-two-website/dist/alipay-qr.png;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 用户上传文件
    location /jzxr/uploads/ { 
        alias /var/www/my-two-website/backend/uploads/;
        expires 30d;
    }

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}