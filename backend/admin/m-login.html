<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录 - 精准匹配</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #FFF0F5, #FFE4E9); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    
    .login-box { background: #fff; border-radius: 20px; padding: 30px; width: 100%; max-width: 340px; box-shadow: 0 10px 40px rgba(255,150,180,0.25); }
    
    .logo { text-align: center; margin-bottom: 25px; }
    .logo h1 { font-size: 22px; color: #FF69B4; font-weight: 600; }
    .logo p { font-size: 13px; color: #FF85B3; margin-top: 4px; }
    
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; color: #FF69B4; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
    .input-group input { width: 100%; padding: 14px 16px; border: 2px solid #FFB6C1; border-radius: 12px; font-size: 15px; color: #333; background: #FFF5F8; outline: none; }
    .input-group input:focus { border-color: #FF69B4; background: #fff; }
    
    .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #FF69B4, #FF85B3); color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 10px; }
    .btn:active { transform: scale(0.98); }
    
    .err { color: #FF6B8A; text-align: center; margin-top: 14px; font-size: 13px; display: none; }
    .err.show { display: block; }
    
    .tip { text-align: center; margin-top: 15px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <h1>🔓 精准匹配 · 管理后台</h1>
      <p>输入密码登录</p>
    </div>
    
    <div class="input-group">
      <label>管理员账号</label>
      <input type="text" id="username" placeholder="请输入管理员账号">
    </div>
    
    <div class="input-group">
      <label>管理员密码</label>
      <input type="password" id="password" placeholder="请输入密码">
    </div>
    
    <button class="btn" onclick="login()">登录</button>
    
    <div class="err" id="errorMsg">密码错误</div>
    
    <div class="tip">登录后解锁用户联系方式</div>
  </div>

  <script>
    // 自动检测是否需要 /jzxr 前缀
    const API_BASE = window.location.pathname.includes('/jzxr') ? '/jzxr' : '';
    
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      
      if (!username) {
        errorMsg.textContent = '请输入管理员账号';
        errorMsg.classList.add('show');
        return;
      }
      if (!password) {
        errorMsg.textContent = '请输入密码';
        errorMsg.classList.add('show');
        return;
      }
      
      errorMsg.classList.remove('show');
      
      try {
        const response = await fetch(API_BASE + '/api/admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        
        if (data.success && data.token) {
          localStorage.setItem('admin_token', data.token);
          document.cookie = 'admin_token=' + data.token + ';path=/;max-age=86400;SameSite=Lax';
          window.location.href = API_BASE + '/admin/m';
        } else {
          errorMsg.textContent = data.message || '密码错误';
          errorMsg.classList.add('show');
        }
      } catch (e) {
        errorMsg.textContent = '网络错误，请重试';
        errorMsg.classList.add('show');
      }
    }
  </script>
</body>
</html>
